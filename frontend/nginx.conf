server {
    listen 3000;
    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers (applied to every response) ─────────────────
    #
    # Clickjacking, MIME-sniffing, and referrer-leak protections are
    # baseline requirements for a portal handling compliance evidence.
    # CSP is tight: no inline scripts (the Vite build emits hashed JS
    # files), no inline styles other than Tailwind's bundle, no eval.
    # Adjust the connect-src list if the portal ever calls an origin
    # other than its own /api/ proxy.
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    # React SPA — all routes fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to FastAPI backend
    location /api/ {
        proxy_pass http://api:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Health check (nginx-only; doesn't probe the backend)
    location /health {
        return 200 "ok";
        add_header Content-Type text/plain;
    }
}
