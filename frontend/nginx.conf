server {
    listen 3000;
    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers (applied to every response) ─────────────────
    #
    # Clickjacking, MIME-sniffing, and referrer-leak protections are
    # baseline requirements for a portal handling compliance evidence.
    # CSP: no inline scripts (the Vite build emits hashed JS files),
    # no inline styles other than what the SPA's component lib
    # injects, no eval, no <object>/<embed>/<applet>, no plugin
    # fallbacks. Adjust connect-src only if the portal ever calls an
    # origin other than its own /api/ proxy.
    #
    # NOTE on style-src 'unsafe-inline': PatternFly + Vite inject
    # inline styles. Removing 'unsafe-inline' without enumerating
    # those styles' SHA-256 hashes (or using a per-request nonce
    # via nginx scripting) would break the SPA. Tracked as P0-D2;
    # see docs/secret_key_rotation.md "Follow-on hardening" section.
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    # React SPA — all routes fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to FastAPI backend
    location /api/ {
        proxy_pass http://api:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Health check (nginx-only; doesn't probe the backend)
    location /health {
        return 200 "ok";
        add_header Content-Type text/plain;
    }
}
