name: API Tests

on:
  pull_request:
    paths:
      - "api/**"
      - ".github/workflows/api-tests.yml"
  push:
    branches: [main]
    paths:
      - "api/**"

jobs:
  test:
    name: pytest
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: api

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Set up Python 3.11
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            api/requirements.txt
            api/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      # Rootless podman is preinstalled on ubuntu-latest GitHub Actions
      # runners (24.04). Start the systemd user socket so testcontainers
      # can talk to it via DOCKER_HOST without falling back to a docker
      # daemon. Per the AAC stack convention we ship podman, never docker.
      - name: Enable rootless podman socket
        run: |
          systemctl --user enable --now podman.socket || \
            { sudo apt-get update && sudo apt-get install -y podman && \
              systemctl --user enable --now podman.socket; }
          echo "DOCKER_HOST=unix:///run/user/$(id -u)/podman/podman.sock" >> "$GITHUB_ENV"
          echo "TESTCONTAINERS_RYUK_DISABLED=true" >> "$GITHUB_ENV"

      - name: Run unit tests
        run: pytest -v -m "not integration"

      - name: Run integration tests
        run: pytest -v -m integration
