version: "3.9"

services:
  api:
    image: localhost/aac-portal-api:dev
    build:
      context: ../../api
      dockerfile: Containerfile
    # Port 8000 is NOT published to the host — the API is reachable
    # only inside the compose network via nginx's /api/ proxy. This
    # prevents the FastAPI surface from being network-accessible
    # directly to anyone on the host's L2.
    expose:
      - "8000"
    env_file:
      - ../../.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    image: localhost/aac-portal-frontend:dev
    build:
      context: ../../frontend
      dockerfile: Containerfile
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped
