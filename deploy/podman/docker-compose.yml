version: "3.9"

services:
  api:
    image: localhost/aac-portal-api:dev
    build:
      context: ../../api
      dockerfile: Containerfile
    ports:
      - "8000:8000"
    env_file:
      - ../../.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    image: localhost/aac-portal-frontend:dev
    build:
      context: ../../frontend
      dockerfile: Containerfile
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000/api
    depends_on:
      - api
    restart: unless-stopped
